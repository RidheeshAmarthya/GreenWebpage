<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Page Not Found | Green International</title>
    <meta name="description" content="The page you are looking for does not exist on Green International.">
    <meta name="robots" content="noindex, follow">
    <link rel="shortcut icon" href="/assets/images/green-logo.png" type="image/x-icon">

    <link rel="stylesheet" href="/assets/bootstrap/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter Tight', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .error-container {
            max-width: 500px;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 4rem;
            color: #28a745;
            font-weight: bold;
        }

        .btn-green {
            background: #28a745;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .btn-green:hover {
            background: #218838;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="error-container">
        <h1>404</h1>
        <h2 class="mb-3">Page Not Found</h2>
        <p class="text-muted">Oops! The page you are looking for might have been removed, had its name changed, or is
            temporarily unavailable.</p>
        <a href="/" class="btn-green">Return to Homepage</a>
    </div>
</body>

</html>
